<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智集電商 - 登入</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
  
  <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl border border-gray-50">
    
    <div class="flex items-center gap-2 mb-6">
      <span class="text-2xl">🛒</span>
      <h1 class="text-xl font-bold text-gray-800">智集電商</h1>
    </div>
    
    <div class="space-y-5">
      <div>
        <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Email</label>
        <input type="email" id="email" placeholder="請輸入 email"
          class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm">
      </div>
      
      <div>
        <label class="block text-xs font-bold text-gray-400 uppercase mb-2">密碼</label>
        <input type="password" id="password" placeholder="請輸入密碼"
          class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm">
      </div>
      
      <button id="loginBtn"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition active:scale-95 shadow-md text-lg">
        登入
      </button>
    </div>
    
    <p class="mt-6 text-center text-xs text-gray-400">* 帳號由管理者建立</p>
  </div>

  <script>
    document.getElementById('loginBtn').addEventListener('click', () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      if (!email || !password) {
        alert('請填寫 email 和密碼');
        return;
      }
      
      // TODO: 串接 Supabase Auth
      // 暫時直接跳轉
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
