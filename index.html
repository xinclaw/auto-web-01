<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智集電商 - 登入</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
  
  <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl border border-gray-50">
    
    <div class="flex items-center gap-2 mb-6">
      <span class="text-2xl">🛒</span>
      <h1 class="text-xl font-bold text-gray-800">智集電商</h1>
    </div>

    <!-- 登入表單 -->
    <div id="loginSection">
      <div class="space-y-5">
        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Email</label>
          <input type="email" id="email" placeholder="請輸入 email"
            class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm">
        </div>
        
        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase mb-2">密碼</label>
          <input type="password" id="password" placeholder="請輸入密碼"
            class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm">
        </div>
        
        <button id="loginBtn"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition active:scale-95 shadow-md text-lg">
          登入
        </button>

        <button id="switchToSignup"
          class="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-3 rounded-xl transition text-sm">
          還沒有帳號？註冊新帳號
        </button>
      </div>
    </div>

    <!-- 註冊表單 -->
    <div id="signupSection" class="hidden">
      <div class="space-y-5">
        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Email</label>
          <input type="email" id="signupEmail" placeholder="請輸入 email"
            class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm">
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase mb-2">密碼（至少6字元）</label>
          <input type="password" id="signupPassword" placeholder="請輸入密碼"
            class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm">
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase mb-2">確認密碼</label>
          <input type="password" id="signupPasswordConfirm" placeholder="請再次輸入密碼"
            class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm">
        </div>
        
        <button id="signupBtn"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl transition active:scale-95 shadow-md text-lg">
          註冊
        </button>

        <button id="switchToLogin"
          class="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-3 rounded-xl transition text-sm">
          已有帳號？回登入
        </button>
      </div>
    </div>

    <p id="authMessage" class="mt-4 text-center text-xs text-red-500 font-medium hidden"></p>
  </div>

  <script>
    // ======= Supabase 設定 =======
    const SUPABASE_URL = localStorage.getItem('supabaseUrl') || '';
    const SUPABASE_ANON_KEY = localStorage.getItem('supabaseKey') || '';

    let supabase = null;

    function initSupabase() {
      if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
        document.getElementById('authMessage').textContent = '請先在「系統設定」填入 Supabase URL 和 Anon Key';
        document.getElementById('authMessage').classList.remove('hidden');
        document.getElementById('authMessage').classList.add('text-red-500');
        return null;
      }
      return window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    // 檢查是否已登入
    async function checkSession() {
      const client = initSupabase();
      if (!client) return;

      const { data: { session } } = await client.auth.getSession();
      if (session) {
        window.location.href = 'dashboard.html';
      }
    }

    // 切換登入/註冊
    document.getElementById('switchToSignup').addEventListener('click', () => {
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('signupSection').classList.remove('hidden');
      document.getElementById('authMessage').classList.add('hidden');
    });

    document.getElementById('switchToLogin').addEventListener('click', () => {
      document.getElementById('signupSection').classList.add('hidden');
      document.getElementById('loginSection').classList.remove('hidden');
      document.getElementById('authMessage').classList.add('hidden');
    });

    // 登入
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      if (!email || !password) {
        const msg = document.getElementById('authMessage');
        msg.textContent = '請填寫 email 和密碼';
        msg.classList.remove('hidden');
        return;
      }

      const client = initSupabase();
      if (!client) return;

      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.classList.add('opacity-60', 'cursor-not-allowed');
      btn.textContent = '登入中...';

      const { data, error } = await client.auth.signInWithPassword({ email, password });

      if (error) {
        const msg = document.getElementById('authMessage');
        msg.textContent = '登入失敗：' + error.message;
        msg.classList.remove('hidden');
        btn.disabled = false;
        btn.classList.remove('opacity-60', 'cursor-not-allowed');
        btn.textContent = '登入';
      } else {
        window.location.href = 'dashboard.html';
      }
    });

    // 註冊
    document.getElementById('signupBtn').addEventListener('click', async () => {
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const passwordConfirm = document.getElementById('signupPasswordConfirm').value;

      if (!email || !password) {
        const msg = document.getElementById('authMessage');
        msg.textContent = '請填寫所有欄位';
        msg.classList.remove('hidden');
        return;
      }

      if (password !== passwordConfirm) {
        const msg = document.getElementById('authMessage');
        msg.textContent = '兩次密碼輸入不一致';
        msg.classList.remove('hidden');
        return;
      }

      if (password.length < 6) {
        const msg = document.getElementById('authMessage');
        msg.textContent = '密碼至少需要 6 個字元';
        msg.classList.remove('hidden');
        return;
      }

      const client = initSupabase();
      if (!client) return;

      const btn = document.getElementById('signupBtn');
      btn.disabled = true;
      btn.classList.add('opacity-60', 'cursor-not-allowed');
      btn.textContent = '註冊中...';

      const { data, error } = await client.auth.signUp({ email, password });

      if (error) {
        const msg = document.getElementById('authMessage');
        msg.textContent = '註冊失敗：' + error.message;
        msg.classList.remove('hidden');
        btn.disabled = false;
        btn.classList.remove('opacity-60', 'cursor-not-allowed');
        btn.textContent = '註冊';
      } else {
        const msg = document.getElementById('authMessage');
        msg.textContent = '✅ 註冊成功！請至 email 點擊驗證連結完成開通';
        msg.classList.remove('hidden', 'text-red-500');
        msg.classList.add('text-green-500');
        btn.textContent = '已送出驗證信';

        // 切回登入
        setTimeout(() => {
          document.getElementById('signupSection').classList.add('hidden');
          document.getElementById('loginSection').classList.remove('hidden');
          document.getElementById('email').value = email;
        }, 2000);
      }
    });

    // 初始檢查
    checkSession();
  </script>
</body>
</html>
